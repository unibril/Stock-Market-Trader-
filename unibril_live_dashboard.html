
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --accent: #00e5a0; --accent2: #ff6b35;
    --text: #e8e8f0; --muted: #6b6b80;
    --green: #00e5a0; --red: #ff4560;
    --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .dash { background: var(--bg); min-height: 620px; padding: 18px; border-radius: 12px; border: 1px solid var(--border); font-family: var(--mono); color: var(--text); }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--display); font-size: 17px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .user-row { display: flex; align-items: center; gap: 8px; }
  .user-input { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 8px; border-radius: 4px; width: 70px; outline: none; }
  .btn-sm { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .stat .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .stat .val { font-size: 18px; font-weight: 700; }
  .stat .sub { font-size: 10px; margin-top: 3px; color: var(--muted); }
  .green { color: var(--green); } .red { color: var(--red); }
  .main { display: grid; grid-template-columns: 1fr 280px; gap: 12px; margin-bottom: 12px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .ptitle { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .ptitle::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; color: var(--muted); font-size: 9px; letter-spacing: 1px; padding: 3px 0 8px; font-weight: 400; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 8px 0; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border2); padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; color: var(--accent); }
  .action-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .atab { flex: 1; padding: 6px; font-family: var(--mono); font-size: 10px; text-align: center; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; color: var(--muted); background: transparent; }
  .atab.buy.active { background: rgba(0,229,160,0.12); color: var(--green); border-color: var(--green); }
  .atab.sell.active { background: rgba(255,69,96,0.12); color: var(--red); border-color: var(--red); }
  .finput { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 7px 9px; border-radius: 5px; margin-bottom: 7px; outline: none; }
  .finput:focus { border-color: var(--accent); }
  .preview { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 7px; }
  .preview span { color: var(--text); }
  .btn-exec { width: 100%; padding: 8px; border-radius: 5px; font-family: var(--mono); font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
  .btn-buy { background: var(--green); color: #000; }
  .btn-sell { background: var(--red); color: #fff; }
  .msg { font-size: 10px; margin-top: 8px; padding: 6px 8px; border-radius: 4px; text-align: center; }
  .msg.ok { background: rgba(0,229,160,0.1); color: var(--green); }
  .msg.err { background: rgba(255,69,96,0.1); color: var(--red); }
  .loading { color: var(--muted); font-size: 11px; padding: 20px 0; text-align: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; margin-right: 6px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>

<div class="dash">
  <div class="topbar">
    <div class="logo">Unibril's <span>Finance</span> Tracker</div>
    <div class="user-row">
      <span style="font-size:10px;color:var(--muted)">user_id:</span>
      <input class="user-input" id="uidInput" type="number" value="1" min="1" />
      <button class="btn-sm" onclick="loadPortfolio()">Load ↗</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="lbl">Cash Balance</div><div class="val" id="statBalance">—</div><div class="sub">available</div></div>
    <div class="stat"><div class="lbl">Portfolio Value</div><div class="val" id="statValue">—</div><div class="sub">at market price</div></div>
    <div class="stat"><div class="lbl">Total P&L</div><div class="val" id="statPnl">—</div><div class="sub" id="statPnlSub">all time</div></div>
    <div class="stat"><div class="lbl">Positions</div><div class="val" id="statPos">—</div><div class="sub">open</div></div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="ptitle">Holdings</div>
      <div id="holdingsArea"><div class="loading">Enter user ID and click Load</div></div>
    </div>

    <div class="panel">
      <div class="ptitle">Quick Trade</div>
      <div class="action-tabs">
        <button class="atab buy active" id="tabBuy" onclick="setMode('buy')">BUY</button>
        <button class="atab sell" id="tabSell" onclick="setMode('sell')">SELL</button>
      </div>
      <input class="finput" id="trTicker" placeholder="Ticker (e.g. AAPL)" oninput="updatePreview()" />
      <div class="preview">Price <span id="prPrice">—</span></div>
      <input class="finput" id="trQty" type="number" placeholder="Quantity" min="1" oninput="updatePreview()" />
      <div class="preview">Total <span id="prTotal">—</span></div>
      <button class="btn-exec btn-buy" id="execBtn" onclick="executeTrade()">EXECUTE BUY</button>
      <div id="tradeMsg"></div>
      <div style="margin-top:12px;display:flex;align-items:center;font-size:10px;padding:8px;background:var(--surface2);border-radius:5px;border:1px solid var(--border)">
        <span class="dot"></span>
        <span style="color:var(--muted)">Bot running · SMA crossover</span>
      </div>
    </div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:5000";
  let mode = "buy";
  let mockPrices = {};

  function setMode(m) {
    mode = m;
    document.getElementById("tabBuy").classList.toggle("active", m === "buy");
    document.getElementById("tabSell").classList.toggle("active", m === "sell");
    const btn = document.getElementById("execBtn");
    btn.className = "btn-exec btn-" + m;
    btn.textContent = "EXECUTE " + m.toUpperCase();
    updatePreview();
  }

  async function loadPortfolio() {
    const uid = document.getElementById("uidInput").value;
    document.getElementById("holdingsArea").innerHTML = '<div class="loading">Fetching...</div>';
    try {
      const res = await fetch(`${API}/portfolio?user_id=${uid}`);
      const data = await res.json();
      if (data.error) { document.getElementById("holdingsArea").innerHTML = `<div class="loading red">${data.error}</div>`; return; }

      document.getElementById("statBalance").textContent = "$" + data.balance.toFixed(2);

      let totalValue = 0, totalPnl = 0;
      data.holdings.forEach(h => { totalValue += h.current_price * h.quantity; totalPnl += h.pnl; mockPrices[h.ticker.toUpperCase()] = h.current_price; });

      document.getElementById("statValue").textContent = "$" + totalValue.toFixed(2);
      const pnlEl = document.getElementById("statPnl");
      pnlEl.textContent = (totalPnl >= 0 ? "+$" : "-$") + Math.abs(totalPnl).toFixed(2);
      pnlEl.className = "val " + (totalPnl >= 0 ? "green" : "red");
      document.getElementById("statPos").textContent = data.holdings.length;

      if (data.holdings.length === 0) { document.getElementById("holdingsArea").innerHTML = '<div class="loading">No holdings found.</div>'; return; }

      let html = '<table><thead><tr><th>Ticker</th><th>Qty</th><th>Avg Buy</th><th>Current</th><th>P&L</th></tr></thead><tbody>';
      data.holdings.forEach(h => {
        const pnlClass = h.pnl >= 0 ? "green" : "red";
        const pnlStr = (h.pnl >= 0 ? "+$" : "-$") + Math.abs(h.pnl).toFixed(2);
        html += `<tr>
          <td><span class="badge">${h.ticker.toUpperCase()}</span></td>
          <td>${h.quantity}</td>
          <td>$${h.avg_buy.toFixed(2)}</td>
          <td>$${h.current_price.toFixed(2)}</td>
          <td class="${pnlClass}">${pnlStr}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById("holdingsArea").innerHTML = html;
    } catch(e) {
      document.getElementById("holdingsArea").innerHTML = '<div class="loading red">Cannot reach Flask server. Is it running?</div>';
    }
  }

  function updatePreview() {
    const ticker = document.getElementById("trTicker").value.toUpperCase().trim();
    const qty = parseInt(document.getElementById("trQty").value) || 0;
    const price = mockPrices[ticker];
    document.getElementById("prPrice").textContent = price ? "$" + price.toFixed(2) : "—";
    document.getElementById("prTotal").textContent = (price && qty) ? "$" + (price * qty).toFixed(2) : "—";
  }

  async function executeTrade() {
    const uid = document.getElementById("uidInput").value;
    const ticker = document.getElementById("trTicker").value.toUpperCase().trim();
    const qty = parseInt(document.getElementById("trQty").value);
    const msgEl = document.getElementById("tradeMsg");

    if (!ticker || !qty) { msgEl.innerHTML = '<div class="msg err">Enter ticker and quantity</div>'; return; }

    msgEl.innerHTML = '<div class="msg">Executing...</div>';

    try {
      const endpoint = mode === "buy" ? "/buy" : "/sell";
      const body = { user_id: parseInt(uid), ticker, quantity: qty };
      if (mode === "sell") body.batch_index = null;

      const res = await fetch(API + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (data.error) {
        msgEl.innerHTML = `<div class="msg err">${data.error}</div>`;
      } else {
        msgEl.innerHTML = `<div class="msg ok">${data.message}<br>Balance: $${data.new_balance.toFixed(2)}</div>`;
        loadPortfolio();
      }
    } catch(e) {
      msgEl.innerHTML = '<div class="msg err">Server unreachable</div>';
    }
  }

  loadPortfolio();
</script>
